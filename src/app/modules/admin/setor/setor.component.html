<div class="absolute inset-0 flex flex-col min-w-0 overflow-hidden">
  <!-- Header -->
  <div class="relative flex flex-col flex-0 lg:flex-row lg:items-center lg:justify-between px-6 pt-6 pb-4 lg:pr-8 lg:pl-7 sm:pt-10 sm:pb-6 bg-primary-700 dark:bg-transparent">
    <div class="flex flex-col items-start flex-auto min-w-0">
      <div class="text-2xl sm:text-4xl font-extrabold tracking-tight leading-none text-on-primary dark:text-white">
        Setores · Lista
      </div>
      <div class="text-on-primary/80 mt-2">Gerencie seus setores: criar, editar, visualizar e excluir.</div>
    </div>
    <div class="mt-4 lg:mt-0 flex items-center gap-3">
      <button class="px-4 py-2 rounded-lg bg-primary-500 text-white hover:bg-primary-600" (click)="novo()">Novo Setor ➕</button>
      <button class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200" (click)="exportCsv()">Export CSV</button>
    </div>
  </div>

  <!-- Main -->
  <div class="flex flex-auto overflow-hidden">
    <div class="flex flex-col flex-auto overflow-y-auto -webkit-overflow-scrolling-touch">
      <div class="flex-auto p-6 sm:p-10">
        <!-- Filtros e busca -->
        <div class="flex flex-col sm:flex-row gap-4 items-stretch sm:items-end mb-6">
          <div class="flex-1">
            <label class="block text-md font-bold text-secondary mb-1">Pesquisa</label>
            <input class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none" [(ngModel)]="searchTerm" (ngModelChange)="searchTerm$.next($event)" placeholder="Buscar por nome..." />
          </div>
          <!-- Placeholder para filtro futuro, ex.: por tipo; removido por simplicidade no setor -->
        </div>

        <!-- Formulário de criação/edição/visualização -->
        <div *ngIf="mode !== 'list'" class="mb-6 p-6 bg-card rounded-2xl shadow border border-gray-200">
          <div class="text-lg font-semibold mb-4">{{ mode === 'view' ? 'Visualizar Setor' : (mode === 'edit' ? 'Editar Setor' : 'Novo Setor') }}</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm text-secondary mb-1">ID</label>
              <input class="w-full px-3 py-2 rounded-lg border" type="number" [(ngModel)]="form.id" readonly />
            </div>
            <div>
              <label class="block text-sm text-secondary mb-1">Nome</label>
              <input class="w-full px-3 py-2 rounded-lg border" type="text" [(ngModel)]="form.nome" [readonly]="mode === 'view'" />
                </div>
            <div>
              <label class="block text-sm text-secondary mb-1">Empresa</label>
              <input class="w-full px-3 py-2 rounded-lg border" type="number" [(ngModel)]="form.empresaId" [readonly]="mode === 'view'" />
            </div>
            <div>
              <label class="block text-sm text-secondary mb-1">Descrição</label>
              <input class="w-full px-3 py-2 rounded-lg border" type="text" [(ngModel)]="form.descricao" [readonly]="mode === 'view'" />
            </div>
            <div class="flex items-center gap-2 mt-2">
              <input type="checkbox" [(ngModel)]="form.ativo" [disabled]="mode === 'view'" />
              <span>Ativo?</span>
            </div>

          </div>
            <div class="mt-6 flex gap-3">
            <button *ngIf="mode !== 'view'" class="px-4 py-2 rounded-lg bg-primary-500 text-white hover:bg-primary-600" (click)="salvar()">Salvar</button>
            <button class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200" (click)="cancelar()">Fechar</button>
          </div>
        </div>

        <!-- Tabela -->
        <div *ngIf="mode === 'list'" class="bg-card rounded-2xl shadow overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr class="bg-gray-50">
                <th class="px-4 py-3 border-b">Sel.</th>
                <th class="px-4 py-3 border-b">ID</th>
                <th class="px-4 py-3 border-b">Nome</th>
                <th class="px-4 py-3 border-b">Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let s of (filteredSetores$ | async)" class="hover:bg-gray-50">
                <td class="px-4 py-3 border-b"><input type="checkbox" [checked]="selectedIds.has(s.id)" (change)="toggleSelection(s.id, $event.target.checked)" /></td>
                <td class="px-4 py-3 border-b">{{ s.id }}</td>
                <td class="px-4 py-3 border-b">{{ s.nome }}</td>
                <td class="px-4 py-3 border-b">
                  <div class="flex gap-2">
                    <button class="px-2 py-1 rounded bg-gray-100 hover:bg-gray-200" (click)="visualizar(s)" title="Visualizar">👁️</button>
                    <button class="px-2 py-1 rounded bg-gray-100 hover:bg-gray-200" (click)="editar(s)" title="Editar">✏️</button>
                    <button class="px-2 py-1 rounded bg-red-100 hover:bg-red-200 text-red-700" (click)="excluir(s)" title="Excluir">🗑️</button>
                  </div>
                </td>
              </tr>
            </tbody>
            <ng-container *ngIf="(filteredSetores$ | async)?.length === 0">
              <tfoot>
                <tr>
                  <td colspan="4" class="text-center py-4 text-secondary">
                    Nenhum registro cadastrado
                  </td>
                </tr>
              </tfoot>
            </ng-container>
          </table>
          
          <!-- Componente de Paginação -->
          <app-pagination 
            *ngIf="pagination$ | async as p"
            [page]="currentPage"
            [size]="pageSize"
            [totalElements]="p.totalElements"
            [totalPages]="p.totalPages"
            (pageChange)="onPageChange($event)"
            (sizeChange)="onSizeChange($event)">
          </app-pagination>
        </div>
      </div>
    </div>
  </div>
</div>
