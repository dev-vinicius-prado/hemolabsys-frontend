<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
    <div class="flex flex-col shadow bg-card">
        <div class="flex flex-col w-full max-w-screen-xl mx-auto px-6 sm:px-8">
            <div class="flex flex-col sm:flex-row flex-auto sm:items-center min-w-0 my-8 sm:my-12">
                <!-- Avatar and Welcome -->
                <div class="flex flex-auto items-center min-w-0">
                    <div class="flex-0 w-16 h-16 rounded-full overflow-hidden">
                        <img class="w-full h-full object-cover" [src]="user?.avatar || 'assets/images/avatars/brian-hughes.jpg'">
                    </div>
                    <div class="flex flex-col min-w-0 ml-4">
                        <div class="text-2xl md:text-5xl font-semibold tracking-tight leading-7 md:leading-snug truncate">
                            {{ 'PERFIL' | transloco }}
                        </div>
                        <div class="flex items-center mt-1.5 text-secondary">
                            <mat-icon class="icon-size-5 text-current" [svgIcon]="'heroicons_outline:user'"></mat-icon>
                            <div class="ml-1.5 text-md font-medium tracking-tight">Gerencie suas informações pessoais</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-auto p-6 sm:p-10">

        <div class="max-w-3xl mx-auto">
            <div class="flex flex-col flex-auto p-6 sm:p-8 bg-card shadow rounded-2xl overflow-hidden">
                <div class="text-lg font-medium">Informações Básicas</div>
                <div class="text-secondary">Edite seu nome, e-mail e altere sua senha.</div>

                <form [formGroup]="profileForm" class="flex flex-col mt-8">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full">
                        <!-- Name -->
                        <mat-form-field class="fuse-mat-no-subscript">
                            <mat-label>Nome Completo</mat-label>
                            <mat-icon class="icon-size-5" matPrefix [svgIcon]="'heroicons_outline:user'"></mat-icon>
                            <input matInput [formControlName]="'nome'">
                        </mat-form-field>

                        <!-- Email -->
                        <mat-form-field class="fuse-mat-no-subscript">
                            <mat-label>E-mail</mat-label>
                            <mat-icon class="icon-size-5" matPrefix [svgIcon]="'heroicons_outline:envelope'"></mat-icon>
                            <input matInput [formControlName]="'email'">
                        </mat-form-field>

                        <!-- CPF (Disabled) -->
                        <mat-form-field class="fuse-mat-no-subscript">
                            <mat-label>CPF (Não editável)</mat-label>
                            <mat-icon class="icon-size-5" matPrefix [svgIcon]="'heroicons_outline:identification'"></mat-icon>
                            <input matInput [formControlName]="'cpf'">
                        </mat-form-field>

                        <!-- Role (Disabled) -->
                        <mat-form-field class="fuse-mat-no-subscript">
                            <mat-label>Perfil / Role (Não editável)</mat-label>
                            <mat-icon class="icon-size-5" matPrefix [svgIcon]="'heroicons_outline:shield-check'"></mat-icon>
                            <input matInput [formControlName]="'role'">
                        </mat-form-field>
                    </div>

                    <div class="mt-8">
                        <div class="text-lg font-medium">Segurança</div>
                        <div class="text-secondary">Deixe em branco para manter a senha atual.</div>
                    </div>

                    <!-- Password -->
                    <mat-form-field class="mt-4 fuse-mat-no-subscript">
                        <mat-label>Nova Senha</mat-label>
                        <mat-icon class="icon-size-5" matPrefix [svgIcon]="'heroicons_outline:lock-closed'"></mat-icon>
                        <input matInput type="password" [formControlName]="'senha'">
                    </mat-form-field>

                    <!-- Actions -->
                    <div class="flex items-center justify-end mt-10 gap-3">
                        <button mat-stroked-button (click)="cancel()">
                            {{ 'CANCELAR' | transloco }}
                        </button>
                        <button mat-flat-button [color]="'primary'" (click)="updateProfile()" [disabled]="profileForm.invalid">
                            Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

</div>
